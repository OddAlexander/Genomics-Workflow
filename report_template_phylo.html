<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phylogenomics Report</title>
<style>
  :root {
    --blue:   #1a3a5c;
    --blue2:  #2e6da4;
    --teal:   #17a2b8;
    --green:  #28a745;
    --yellow: #ffc107;
    --red:    #dc3545;
    --bg:     #f5f7fa;
    --card:   #ffffff;
    --border: #e2e8f0;
    --text:   #1a1a2e;
    --muted:  #6c757d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; font-size: 14px; }
  h1 { color: var(--blue); font-size: 1.5rem; padding-bottom: 10px;
       border-bottom: 2px solid var(--blue); margin-bottom: 20px; }
  h2 { color: var(--blue2); font-size: 1.1rem; margin: 20px 0 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 16px; margin-bottom: 12px; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .meta span { margin-right: 24px; }
  .meta strong { color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: var(--blue); color: white; padding: 7px 12px; text-align: left; font-weight: 600; }
  td { padding: 5px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f8fafc; }
  .snp-wrap { overflow: auto; }
  .snp-matrix { width: auto; white-space: nowrap; }
  .snp-matrix th, .snp-matrix td { padding: 4px 8px; text-align: center; font-size: 0.82rem;
                                    border: 1px solid var(--border); }
  .snp-matrix th { background: var(--blue); color: white; }
  .snp-matrix td { font-variant-numeric: tabular-nums; }
  .dl-btn { display: inline-block; padding: 7px 18px; border-radius: 5px;
            background: var(--blue2); color: white; text-decoration: none;
            font-size: 0.88rem; font-weight: 600; margin-right: 10px; }
  .dl-btn:hover { background: var(--blue); }
  .tree-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tree-label { font-weight: 600; min-width: 80px; color: var(--text); }
  .tree-note { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
<h1>Phylogenomics Report</h1>
<div id="root"></div>

<script>
const D = __PHYLO_JSON_DATA__;

// ── SNP matrix renderer ────────────────────────────────────────────────────
function renderSNPMatrix(data, threshold) {
  const { samples, matrix } = data;
  if (!samples.length) return '<p style="color:var(--muted)">No SNP distance matrix available.</p>';

  const vals  = matrix.flat().filter(v => v > 0);
  const maxV  = vals.length ? Math.max(...vals) : 1;
  const short = samples.map(s => s.split('/').pop());

  function cellBg(v) {
    if (v === 0) return '#f8fafc';
    if (threshold != null) {
      if (v <= threshold) {
        const t = v / threshold;
        return `rgb(${Math.round(255 - t*215)},${Math.round(255 - t*88)},${Math.round(255 - t*186)})`;
      } else {
        const t = Math.min((v - threshold) / (maxV - threshold || 1), 1);
        return `rgb(${Math.round(255 - t*75)},${Math.round(200 - t*170)},${Math.round(200 - t*170)})`;
      }
    }
    const t = v / maxV;
    return `rgb(${Math.round(255 - t*35)},${Math.round(255 - t*185)},${Math.round(255 - t*185)})`;
  }
  function luma(r,g,b) { return 0.299*r + 0.587*g + 0.114*b; }
  function cellFg(v) {
    if (v === 0) return '#1a1a2e';
    if (threshold != null) {
      if (v <= threshold) {
        const t = v / threshold;
        return luma(255-t*215, 255-t*88, 255-t*186) < 140 ? '#fff' : '#1a1a2e';
      } else {
        const t = Math.min((v - threshold) / (maxV - threshold || 1), 1);
        return luma(255-t*75, 200-t*170, 200-t*170) < 140 ? '#fff' : '#1a1a2e';
      }
    }
    return v / maxV > 0.6 ? '#fff' : '#1a1a2e';
  }

  let html = '';
  if (threshold != null) {
    html += `<p style="font-size:0.82rem;margin-bottom:8px">
      <span style="display:inline-block;width:12px;height:12px;background:#28a745;border-radius:2px;vertical-align:middle;margin-right:5px"></span>≤${threshold} SNPs (same cluster)
      &ensp;<span style="display:inline-block;width:12px;height:12px;background:#dc3545;border-radius:2px;vertical-align:middle;margin-right:5px"></span>&gt;${threshold} SNPs (different cluster)
    </p>`;
  }
  html += '<table class="snp-matrix"><thead><tr><th></th>';
  for (const n of short) html += `<th>${n}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i < matrix.length; i++) {
    html += `<tr><th style="text-align:left">${short[i]}</th>`;
    for (let j = 0; j < matrix[i].length; j++) {
      const v = matrix[i][j];
      html += `<td style="background:${cellBg(v)};color:${cellFg(v)}">${v}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

// ── Page render ────────────────────────────────────────────────────────────
function fmt(n) { return n ? n.toLocaleString('en-GB') : '-'; }

const refLabel = D.reference || '-';

document.getElementById('root').innerHTML = `
<div class="meta">
  <span><strong>Date:</strong> ${D.run_date}</span>
  <span><strong>Reference:</strong> ${refLabel}</span>
  <span><strong>Samples:</strong> ${D.n_samples}</span>
</div>

<div class="card">
  <h2>Reference</h2>
  <table>
    <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
    <tbody>
      <tr><td>Name</td><td><strong>${D.reference}</strong></td></tr>
      <tr><td>Source</td><td>${D.ref_auto ? 'Auto-generated (Prokka on first sample)' : 'External'}</td></tr>
      <tr><td>Path</td><td style="font-family:monospace;font-size:0.82rem">${D.ref_path}</td></tr>
    </tbody>
  </table>
</div>

<div class="card">
  <h2>Snippy settings</h2>
  <table>
    <thead><tr><th>Parameter</th><th>Value</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td><code>--mincov</code></td><td><strong>${D.snippy_mincov}</strong></td><td>Minimum read coverage for calling a variant</td></tr>
      <tr><td><code>--minfrac</code></td><td><strong>${D.snippy_minfrac}</strong></td><td>Minimum allele frequency for calling a variant</td></tr>
      ${D.core_snp_count != null ? `<tr><td>Core SNPs (core.tab)</td><td><strong>${D.core_snp_count.toLocaleString('en-GB')}</strong></td><td>Variant positions in core alignment (all samples)</td></tr>` : ''}
      ${D.gubbins_snp_count != null ? `<tr><td>SNPs after Gubbins</td><td><strong>${D.gubbins_snp_count.toLocaleString('en-GB')}</strong></td><td>Polymorphic positions after masking recombination</td></tr>` : ''}
    </tbody>
  </table>
  ${D.core_coverage && D.core_coverage.length ? `
  <h3 style="margin-top:1.2rem;font-size:0.95rem">Per-sample core statistics (snippy-core)</h3>
  <table>
    <thead><tr>
      <th>Sample ID</th><th>Ref. length</th><th>Aligned</th><th>Unaligned</th><th>Variants</th><th>Het</th><th>Low coverage</th>
    </tr></thead>
    <tbody>
      ${D.core_coverage.map(r => `<tr>
        <td style="font-family:monospace">${r.id}</td>
        <td>${fmt(r.length)}</td>
        <td>${fmt(r.aligned)}</td>
        <td>${fmt(r.unaligned)}</td>
        <td><strong>${fmt(r.variant)}</strong></td>
        <td>${fmt(r.het)}</td>
        <td>${fmt(r.lowcov)}</td>
      </tr>`).join('')}
    </tbody>
  </table>` : ''}
</div>

<div class="card">
  <h2>Sample overview</h2>
  <table>
    <thead><tr>
      <th>Sample ID</th><th>Species (Skani)</th>
      <th>Contigs</th><th>N50</th><th>Total length (bp)</th>
    </tr></thead>
    <tbody>
      ${D.samples.map(s => `<tr>
        <td style="font-family:monospace">${s.id}</td>
        <td><em>${s.species}</em></td>
        <td>${s.contigs}</td>
        <td>${fmt(s.N50)}</td>
        <td>${fmt(s.total_length)}</td>
      </tr>`).join('')}
    </tbody>
  </table>
</div>

<div class="card">
  <h2>SNP distance matrix (raw core genome)</h2>
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists, D.snp_threshold)}
  </div>
</div>

<div class="card">
  <h2>SNP distance matrix (Gubbins-filtered)</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Recombinant regions have been masked. These SNP distances are more representative of vertical evolution.</p>
  ${D.gubbins_recomb != null ? `
  <div style="font-size:0.85rem;margin-bottom:12px;padding:8px 12px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)">
    <strong>Gubbins recombination:</strong>
    ${D.gubbins_recomb.regions} regions masked,
    total <strong>${fmt(D.gubbins_recomb.bases_masked)}</strong> bp
    ${D.core_snp_count && D.gubbins_snp_count != null
      ? ` — SNP positions reduced from <strong>${D.core_snp_count.toLocaleString('en-GB')}</strong> to <strong>${D.gubbins_snp_count.toLocaleString('en-GB')}</strong>`
      : ''}
  </div>` : ''}
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists_gubbins, D.snp_threshold)}
  </div>
</div>

<div class="card">
  <h2>Tools and versions</h2>
  <table>
    <thead><tr><th>Tool</th><th>Version</th></tr></thead>
    <tbody>
      ${Object.entries(D.tool_versions).map(([k,v]) => `<tr><td>${k}</td><td style="font-family:monospace">${v}</td></tr>`).join('')}
    </tbody>
  </table>
</div>

<div class="card">
  <h2>Tree files</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Upload to <a href="https://itol.embl.de/upload.cgi" target="_blank">iTOL</a>, <a href="https://microreact.org/upload" target="_blank">Microreact</a>, or open in FigTree.</p>
  ${D.iqtree ? `<div class="tree-row">
    <span class="tree-label">IQ-TREE</span>
    <a class="dl-btn" download="iqtree.treefile"
       href="data:text/plain;charset=utf-8,${encodeURIComponent(D.iqtree)}">Download</a>
    <span class="tree-note">GTR+G, UFBoot 1000</span>
  </div>` : ''}
</div>
`;

</script>
</body>
</html>
