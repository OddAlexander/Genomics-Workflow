<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fylogeni-rapport</title>
<style>
  :root {
    --blue:   #1a3a5c;
    --blue2:  #2e6da4;
    --teal:   #17a2b8;
    --green:  #28a745;
    --yellow: #ffc107;
    --red:    #dc3545;
    --bg:     #f5f7fa;
    --card:   #ffffff;
    --border: #e2e8f0;
    --text:   #1a1a2e;
    --muted:  #6c757d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; font-size: 14px; }
  h1 { color: var(--blue); font-size: 1.5rem; padding-bottom: 10px;
       border-bottom: 2px solid var(--blue); margin-bottom: 20px; }
  h2 { color: var(--blue2); font-size: 1.1rem; margin: 20px 0 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 16px; margin-bottom: 12px; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .meta span { margin-right: 24px; }
  .meta strong { color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: var(--blue); color: white; padding: 7px 12px; text-align: left; font-weight: 600; }
  td { padding: 5px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f8fafc; }
  .snp-wrap { overflow: auto; }
  .snp-matrix { width: auto; white-space: nowrap; }
  .snp-matrix th, .snp-matrix td { padding: 4px 8px; text-align: center; font-size: 0.82rem;
                                    border: 1px solid var(--border); }
  .snp-matrix th { background: var(--blue); color: white; }
  .snp-matrix td { font-variant-numeric: tabular-nums; }
  .dl-btn { display: inline-block; padding: 7px 18px; border-radius: 5px;
            background: var(--blue2); color: white; text-decoration: none;
            font-size: 0.88rem; font-weight: 600; margin-right: 10px; }
  .dl-btn:hover { background: var(--blue); }
  .tree-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tree-label { font-weight: 600; min-width: 80px; color: var(--text); }
  .tree-note { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
<h1>Fylogeni-rapport</h1>
<div id="root"></div>

<script>
const D = __PHYLO_JSON_DATA__;

// ── SNP matrix renderer ────────────────────────────────────────────────────
function renderSNPMatrix(data) {
  const { samples, matrix } = data;
  if (!samples.length) return '<p style="color:var(--muted)">Ingen SNP-distansematrise tilgjengelig.</p>';

  const vals  = matrix.flat().filter(v => v > 0);
  const maxV  = vals.length ? Math.max(...vals) : 1;
  const short = samples.map(s => s.split('/').pop());

  function bg(v) {
    if (v === 0) return '#f8fafc';
    const t = v / maxV;
    const r = Math.round(255 - t * 35);
    const g = Math.round(255 - t * 185);
    const b = Math.round(255 - t * 185);
    return `rgb(${r},${g},${b})`;
  }
  function fg(v) {
    return v / maxV > 0.6 ? '#fff' : '#1a1a2e';
  }

  let html = '<table class="snp-matrix"><thead><tr><th></th>';
  for (const n of short) html += `<th>${n}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i < matrix.length; i++) {
    html += `<tr><th style="text-align:left">${short[i]}</th>`;
    for (let j = 0; j < matrix[i].length; j++) {
      const v = matrix[i][j];
      html += `<td style="background:${bg(v)};color:${fg(v)}">${v}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

// ── Page render ────────────────────────────────────────────────────────────
function fmt(n) { return n ? n.toLocaleString('no-NO') : '-'; }

const refLabel = D.reference || '-';

document.getElementById('root').innerHTML = `
<div class="meta">
  <span><strong>Dato:</strong> ${D.run_date}</span>
  <span><strong>Referanse:</strong> ${refLabel}</span>
  <span><strong>Prøver:</strong> ${D.n_samples}</span>
</div>

<div class="card">
  <h2>Referanse</h2>
  <table>
    <thead><tr><th>Parameter</th><th>Verdi</th></tr></thead>
    <tbody>
      <tr><td>Navn</td><td><strong>${D.reference}</strong></td></tr>
      <tr><td>Kilde</td><td>${D.ref_auto ? 'Auto-generert (Prokka på første prøve)' : 'Ekstern'}</td></tr>
      <tr><td>Sti</td><td style="font-family:monospace;font-size:0.82rem">${D.ref_path}</td></tr>
    </tbody>
  </table>
</div>

<div class="card">
  <h2>Prøveoversikt</h2>
  <table>
    <thead><tr>
      <th>Prøve-ID</th><th>Art (skani)</th>
      <th>Contigs</th><th>N50</th><th>Total lengde (bp)</th>
    </tr></thead>
    <tbody>
      ${D.samples.map(s => `<tr>
        <td style="font-family:monospace">${s.id}</td>
        <td><em>${s.species}</em></td>
        <td>${s.contigs}</td>
        <td>${fmt(s.N50)}</td>
        <td>${fmt(s.total_length)}</td>
      </tr>`).join('')}
    </tbody>
  </table>
</div>

<div class="card">
  <h2>SNP-distansematrise</h2>
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists)}
  </div>
</div>

<div class="card">
  <h2>Treefiler</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Last opp til <a href="https://itol.embl.de/upload.cgi" target="_blank">iTOL</a>, <a href="https://microreact.org/upload" target="_blank">Microreact</a> eller åpne i FigTree.</p>
  ${D.iqtree ? `<div class="tree-row">
    <span class="tree-label">IQtree</span>
    <a class="dl-btn" download="iqtree.treefile"
       href="data:text/plain;charset=utf-8,${encodeURIComponent(D.iqtree)}">Last ned</a>
    <span class="tree-note">GTR+G, UFBoot 1000</span>
  </div>` : ''}
</div>
`;

</script>
</body>
</html>
