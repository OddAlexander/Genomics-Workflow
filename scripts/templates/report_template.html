<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline summary -- __SAMPLE_NAME__</title>
<style>
  :root {
    --blue:    #1a3a5c;
    --blue2:   #2e6da4;
    --teal:    #17a2b8;
    --green:   #28a745;
    --yellow:  #ffc107;
    --red:     #dc3545;
    --bg:      #f5f7fa;
    --card:    #ffffff;
    --border:  #e2e8f0;
    --text:    #1a1a2e;
    --muted:   #6c757d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; font-size: 14px; }
  h1 { color: var(--blue); font-size: 1.5rem; padding-bottom: 10px;
       border-bottom: 2px solid var(--blue); margin-bottom: 20px; }
  h2 { color: var(--blue2); font-size: 1.1rem; margin: 20px 0 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 16px; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .stat { background: var(--bg); border-radius: 6px; padding: 12px; text-align: center; }
  .stat .val { font-size: 1.6rem; font-weight: 700; color: var(--blue); line-height: 1; }
  .stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: var(--blue); color: white; padding: 7px 12px; text-align: left;
       font-weight: 600; }
  td { padding: 5px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px;
           font-size: 0.75rem; font-weight: 600; }
  .red    { background: #fde8ea; color: #b02a37; }
  .yellow { background: #fff3cd; color: #856404; }
  .green  { background: #d1e7dd; color: #0a3622; }
  .blue   { background: #cfe2ff; color: #084298; }
  .alert  { border-radius: 6px; padding: 10px 14px; margin-bottom: 8px;
            border-left: 4px solid; font-size: 0.88rem; }
  .alert-red    { background: #fde8ea; border-color: var(--red); }
  .alert-yellow { background: #fff3cd; border-color: var(--yellow); }
  .alert-green  { background: #d1e7dd; border-color: var(--green); }
  .alert-blue   { background: #e8f4f8; border-color: var(--teal); font-family: monospace; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Pipeline summary</h1>
<div id="root"></div>
<script>
const D = __PIPELINE_JSON_DATA__;

const badge = (t, c) => `<span class="badge ${c}">${t}</span>`;
const mob_badge = m => {
  if (!m || m==='-') return badge(m||'-','blue');
  if (m==='CONJUGATIVE') return badge(m,'red');
  if (m.includes('HELPER')) return badge('MOB+HELPER','yellow');
  if (m==='MOBILIZABLE') return badge(m,'yellow');
  return badge(m,'green');
};
// Matches the purity values emitted by derive_purity() in make_report.py.
const purity_badge = p => {
  if (p === 'PURE')        return badge(p, 'green');
  if (p === 'LIKELY_PURE') return badge(p, 'yellow');
  return badge(p, 'red');
};

function render() {
  const s = D;
  let h = '';

  // -- Top section: species-specific typing tiles
  const sp = s.species || '';
  let extraStats = '';

  if (sp.includes('Staphylococcus_aureus')) {
    if (s.sccmec?.type && s.sccmec.type!=='-' && s.sccmec.type!=='skipped')
      extraStats += `<div class="stat"><div class="val" style="color:${s.sccmec.mrsa?'#b02a37':'#0a3622'}">${s.sccmec.mrsa?'MRSA':'MSSA'}</div><div class="lbl">SCCmec ${s.sccmec.type}</div></div>`;
    if (s.spatyper?.spa_type && s.spatyper.spa_type!=='-' && s.spatyper.spa_type!=='skipped')
      extraStats += `<div class="stat"><div class="val" style="font-size:1rem">${s.spatyper.spa_type}</div><div class="lbl">spa-type (${s.spatyper.CC||'-'})</div></div>`;
  }

  // Kleborate -- read from JSON if available
  if (sp.includes('Klebsiella') || sp.includes('Escherichia') || sp.includes('Shigella')) {
    if (s.kleborate?.K_type && s.kleborate.K_type!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:1rem">${s.kleborate.K_type}</div><div class="lbl">K-type</div></div>`;
    if (s.kleborate?.O_type && s.kleborate.O_type!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:1rem">${s.kleborate.O_type}</div><div class="lbl">O-type</div></div>`;
    if (s.kleborate?.virulence_score && s.kleborate.virulence_score!=='-')
      extraStats += `<div class="stat"><div class="val" style="color:${s.kleborate.virulence_score>='2'?'#b02a37':'#0a3622'}">${s.kleborate.virulence_score}</div><div class="lbl">Virulence score</div></div>`;
    if (s.kleborate?.Bla_Carb && s.kleborate.Bla_Carb!=='-') {
      const carbs = s.kleborate.Bla_Carb.split(/[;,]/).map(g=>g.trim()).filter(g=>g&&g!=='-');
      carbs.forEach(g => {
        extraStats += `<div class="stat"><div class="val" style="color:#b02a37;font-size:0.9rem">${g}</div><div class="lbl">Carbapenemase</div></div>`;
      });
    }
    if (s.kleborate?.Bla_ESBL && s.kleborate.Bla_ESBL!=='-') {
      const esbls = s.kleborate.Bla_ESBL.split(/[;,]/).map(g=>g.trim()).filter(g=>g&&g!=='-');
      esbls.forEach(g => {
        extraStats += `<div class="stat"><div class="val" style="color:#856404;font-size:0.9rem">${g}</div><div class="lbl">ESBL</div></div>`;
      });
    }
  }

  // ECTyper serotype
  if (sp.includes('Escherichia') || sp.includes('Shigella')) {
    if (s.ectyper?.serotype && s.ectyper.serotype!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:0.9rem">${s.ectyper.serotype}</div><div class="lbl">Serotype (ECTyper)</div></div>`;
  }

  // emmtyper
  if (sp.includes('Streptococcus_pyogenes')) {
    if (s.emmtyper?.emm_type && s.emmtyper.emm_type!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:1rem">${s.emmtyper.emm_type}</div><div class="lbl">emm-type</div></div>`;
  }

  // SeqSero2
  if (sp.includes('Salmonella')) {
    if (s.seqsero2?.serotype && s.seqsero2.serotype!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:0.9rem">${s.seqsero2.serotype}</div><div class="lbl">Serotype (SeqSero2)</div></div>`;
  }

  // hicap
  if (sp.includes('Haemophilus')) {
    if (s.hicap?.serotype && s.hicap.serotype!=='-')
      extraStats += `<div class="stat"><div class="val" style="font-size:1rem">${s.hicap.serotype}</div><div class="lbl">Capsule type (hicap)</div></div>`;
  }

  // LRE-Finder -- linezolid resistance summary for Enterococcus faecium / faecalis.
  // Tile shows the maximum % of mutated 23S rRNA copies + count of acquired
  // resistance genes (cfr / optrA / poxtA). Red when either is present.
  if (sp.includes('Enterococcus_fae') && s.lrefinder) {
    const mut = s.lrefinder.max_23s_mut_pct;
    const nAc = s.lrefinder.n_acquired;
    if (nAc > 0) {
      extraStats += `<div class="stat"><div class="val" style="color:#b02a37;font-size:0.95rem">${s.lrefinder.acquired_genes.map(g=>g.template.split('_')[0]).join(' ')}</div><div class="lbl">Linezolid R (acquired)</div></div>`;
    }
    if (mut != null && mut >= 0.05) {
      const mutColor = mut >= 5 ? '#b02a37' : mut >= 1 ? '#856404' : '#0a3622';
      extraStats += `<div class="stat"><div class="val" style="color:${mutColor}">${mut.toFixed(2)}%</div><div class="lbl">23S rRNA mutated (LRE)</div></div>`;
    }
  }

  h += `<div class="card"><div class="grid">
    <div class="stat"><div class="val">${s.sample}</div><div class="lbl">Sample</div></div>
    <div class="stat"><div class="val" style="font-size:1rem">${sp.replace(/_/g,' ')}</div><div class="lbl">Species</div></div>
    <div class="stat"><div class="val">ST${s.mlst.ST}</div><div class="lbl">MLST (${s.mlst.scheme})</div></div>
    ${s.kleborate?.ST&&s.kleborate.ST!=='-'?`<div class="stat"><div class="val">ST${s.kleborate.ST}</div><div class="lbl">ST (Kleborate)</div></div>`:''}
    <div class="stat"><div class="val" style="color:${s.amr.total_amr_genes>0?'#b02a37':'inherit'}">${s.amr.total_amr_genes}</div><div class="lbl">AMR genes</div></div>
    <div class="stat"><div class="val">${s.amr.total_virulence_genes}</div><div class="lbl">Virulence genes</div></div>
    <div class="stat"><div class="val">${s.amr.total_stress_genes||0}</div><div class="lbl">Stress genes</div></div>
    <div class="stat"><div class="val">${s.plasmids.count}</div><div class="lbl">Plasmids</div></div>
    ${extraStats}
  </div></div>`;

  // -- Risk alerts
  if (s.amr.high_risk_genes.length)
    h += `<div class="alert alert-red"><strong>HIGH RISK</strong> -- Genes on conjugative plasmids: ${s.amr.high_risk_genes.map(g=>badge(g,'red')).join(' ')}</div>`;
  if (s.amr.medium_risk_genes.length)
    h += `<div class="alert alert-yellow"><strong>MEDIUM RISK</strong> -- Mobilizable + conjugative helper: ${s.amr.medium_risk_genes.map(g=>badge(g,'yellow')).join(' ')}</div>`;

  // -- Read QC
  const q = s.qc || {};
  const depthThr = v => v == null ? 'inherit' : v < 20 ? '#b02a37' : v < 40 ? '#856404' : 'inherit';
  const estColor   = depthThr(q.est_depth);
  const mapColor   = depthThr(q.mapped_depth);
  const brColor    = q.breadth_pct == null ? 'inherit'
                   : q.breadth_pct < 90    ? '#b02a37'
                   : q.breadth_pct < 95    ? '#856404' : 'inherit';
  const q30Color   = q.q30_pct == null   ? 'inherit'
                   : q.q30_pct < 80      ? '#b02a37'
                   : q.q30_pct < 90      ? '#856404'
                                         : 'inherit';
  const primaryPct = s.species_id?.primary_pct;
  const purityColor = primaryPct == null ? 'inherit'
                    : primaryPct < 80     ? '#b02a37'
                    : primaryPct < 90     ? '#856404'
                                          : 'inherit';
  h += `<h2>Read QC</h2><div class="card"><div class="grid">
    <div class="stat"><div class="val">${q.reads != null ? (q.reads/1e6).toFixed(2) : '-'}</div><div class="lbl">Mreads (trimmed)</div></div>
    <div class="stat"><div class="val" style="color:${q30Color}">${q.q30_pct != null ? q.q30_pct + '%' : '-'}</div><div class="lbl">Q30</div></div>
    <div class="stat" title="samtools coverage on bwa-mem2 self-mapped BAM (SeqSphere-equivalent)">
      <div class="val" style="color:${mapColor}">${q.mapped_depth != null ? q.mapped_depth + '×' : '-'}</div>
      <div class="lbl">Depth (mapped)</div>
    </div>
    <div class="stat" title="Fraction of assembly bases covered by ≥1 read">
      <div class="val" style="color:${brColor}">${q.breadth_pct != null ? q.breadth_pct + '%' : '-'}</div>
      <div class="lbl">Breadth</div>
    </div>
    <div class="stat" title="Upper bound: fastp trimmed bases ÷ QUAST assembled length, no remapping">
      <div class="val" style="color:${estColor}">${q.est_depth != null ? q.est_depth + '×' : '-'}</div>
      <div class="lbl">Depth (est.)</div>
    </div>
    <div class="stat"><div class="val">${q.dup_pct != null ? q.dup_pct + '%' : '-'}</div><div class="lbl">Duplication</div></div>
    <div class="stat" title="Bracken fraction assigned to the top species — purity check">
      <div class="val" style="color:${purityColor}">${primaryPct != null ? primaryPct.toFixed(1) + '%' : '-'}</div>
      <div class="lbl">Top species (Kraken2)</div>
    </div>
  </div>
  <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
    Recommended: Q30 &ge;90%, depth (mapped) &ge;40&times; (cgMLST/SeqSphere grade), breadth &ge;95%, top species &ge;90% (purity).
    <span style="color:var(--yellow);font-weight:600">■</span> warn
    &ensp;<span style="color:var(--red);font-weight:600">■</span> flag
    <br>
    <strong>Depth (mapped)</strong> &mdash; bwa-mem2 self-mapping of trimmed reads vs Shovill assembly, summarised by <code>samtools coverage</code>. SeqSphere-equivalent number.<br>
    <strong>Depth (est.)</strong> &mdash; fastp trimmed bases &divide; QUAST assembled length. Upper bound, no remapping. Large gap from mapped depth = adapter / off-organism content.
  </p></div>

  <div class="card" style="background:#e8f4f8;border-left:4px solid var(--blue2)">
    <h2 style="margin-top:0;color:var(--blue);font-size:0.95rem">Coverage requirements for cgMLST-grade typing</h2>
    <ul style="font-size:0.85rem;margin:6px 0 0 18px;line-height:1.6">
      <li><strong>&ge;40&times;</strong> mean coverage, with <strong>&ge;20&times;</strong> on every contig &mdash; Ridom / SeqSphere official floor</li>
      <li><strong>&ge;50&times;</strong> preferred for outbreak reporting (PulseNet, cgMLST.org submissions)</li>
      <li>CT assignment at cgMLST.org requires <strong>&gt;95% good targets</strong> (i.e. &lt;5% missing loci) &mdash; enforced server-side</li>
      <li>Below 40&times; mean coverage, re-sequence rather than override: allele calls become unreliable as LNF (locus not found) rate climbs</li>
    </ul>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
      Sources: Ridom SeqSphere+ NGS QC guide; cgMLST.org nomenclature server submission criteria.
    </p>
  </div>`;

  // -- Optional: reference-mapped depth + variants from the varcall pipeline.
  // Section appears only when results/<sample>/VarCall/ exists (varcall has been run).
  if (s.varcall) {
    const v       = s.varcall;
    const mdColor = q.mapped_depth == null ? 'inherit' : depthThr(v.mean_depth);
    const brColor = v.breadth_pct == null ? 'inherit'
                  : v.breadth_pct < 90    ? '#b02a37'
                  : v.breadth_pct < 95    ? '#856404' : 'inherit';
    const mrColor = v.mapping_rate_pct == null ? 'inherit'
                  : v.mapping_rate_pct < 80    ? '#b02a37'
                  : v.mapping_rate_pct < 95    ? '#856404' : 'inherit';
    h += `<h2>Reference mapping (from varcall pipeline)</h2><div class="card">
      <div class="grid">
        <div class="stat"><div class="val" style="font-size:0.95rem"><em>${(v.reference_species||'-').replace(/_/g,' ')}</em></div><div class="lbl">Reference species</div></div>
        <div class="stat" title="samtools flagstat: % of reads aligning to the reference"><div class="val" style="color:${mrColor}">${v.mapping_rate_pct != null ? v.mapping_rate_pct.toFixed(1) + '%' : '-'}</div><div class="lbl">Mapping rate</div></div>
        <div class="stat" title="Length-weighted mean depth across the reference (samtools coverage)"><div class="val" style="color:${mdColor}">${v.mean_depth != null ? v.mean_depth + '×' : '-'}</div><div class="lbl">Depth (vs ref)</div></div>
        <div class="stat" title="Fraction of reference bases covered by &ge;1 read"><div class="val" style="color:${brColor}">${v.breadth_pct != null ? v.breadth_pct + '%' : '-'}</div><div class="lbl">Breadth (vs ref)</div></div>
        <div class="stat"><div class="val">${v.variants_pass != null ? v.variants_pass.toLocaleString() : '-'}</div><div class="lbl">Variants (PASS)</div></div>
        <div class="stat"><div class="val" style="color:${v.variants_filtered > 0 ? '#856404' : 'inherit'}">${v.variants_filtered != null ? v.variants_filtered.toLocaleString() : '-'}</div><div class="lbl">Filtered (LOW_QUAL)</div></div>
      </div>
      <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
        Depth here is <strong>${v.mean_depth ?? '-'}×</strong> against the chosen NCBI reference vs <strong>${q.mapped_depth ?? '-'}×</strong> mapped to the sample's own assembly above.
        The gap is the fraction of reads that didn't map to this reference (plasmids the reference lacks, strain divergence, contamination).
        &nbsp;Full breakdown:
        <a href="${v.report_link}" style="color:var(--blue2);font-weight:600">varcall_report.html</a>
      </p>
    </div>`;
  }


  // -- Assembly + species ID
  const cmpl = s.assembly.completeness, cont = s.assembly.contamination;
  const cmplColor = cmpl == null ? 'inherit' : cmpl < 90 ? '#b02a37' : cmpl < 95 ? '#856404' : 'inherit';
  const contColor = cont == null ? 'inherit' : cont >= 5 ? '#b02a37' : cont >= 2 ? '#856404' : 'inherit';
  h += `<div class="two-col">`;
  h += `<div><h2>Assembly</h2><div class="card"><div class="grid">
    <div class="stat"><div class="val">${s.assembly.contigs}</div><div class="lbl">Contigs</div></div>
    <div class="stat"><div class="val">${(s.assembly.total_length/1e6).toFixed(2)}</div><div class="lbl">Mb total</div></div>
    <div class="stat"><div class="val">${(s.assembly.N50/1e3).toFixed(0)}</div><div class="lbl">N50 (kb)</div></div>
    <div class="stat"><div class="val">${(s.assembly.largest_contig/1e3).toFixed(0)}</div><div class="lbl">Largest contig (kb)</div></div>
    <div class="stat" title="CheckM lineage_wf: % of single-copy marker genes detected">
      <div class="val" style="color:${cmplColor}">${cmpl != null ? cmpl.toFixed(1) + '%' : '-'}</div>
      <div class="lbl">Completeness</div>
    </div>
    <div class="stat" title="CheckM lineage_wf: % duplicate single-copy markers (proxy for contamination)">
      <div class="val" style="color:${contColor}">${cont != null ? cont.toFixed(1) + '%' : '-'}</div>
      <div class="lbl">Contamination</div>
    </div>
  </div></div></div>`;

  const sid = s.species_id;
  const pcls = sid.purity === 'PURE' ? 'alert-green'
             : sid.purity === 'LIKELY_PURE' ? 'alert-yellow'
             : 'alert-red';
  const score_col = sid.concordance_score===2?'green':'red';
  const score_lbl = sid.concordance_score===2?'Match':'No match';

  h += `<div><h2>Species identification</h2><div class="card">
    <div class="alert ${pcls}" style="margin-bottom:6px"><strong>Purity: ${sid.purity}</strong></div>
    ${(sid.contamination_warnings||[]).map(w=>`<div class="alert alert-yellow" style="margin-bottom:4px">&#9888; ${w}</div>`).join('')}
    <div class="alert alert-blue" style="margin-bottom:8px">
      <strong>Concordance: ${badge(score_lbl, score_col)}</strong><br>
      SKANI: ${(sid.skani_species||'-').replace(/_/g,' ')} &nbsp;|&nbsp;
      Bracken: ${sid.bracken_species.replace(/_/g,' ')}
    </div>
    <table style="margin-top:8px">
      <tr><th colspan="2">SKANI (assembly &rarr; ANI)</th></tr>
      ${sid.skani?.status === 'ok' ? `
        <tr><td>Top hit</td><td>${sid.skani.top_hit}</td></tr>
        <tr><td>ANI</td><td>${badge(sid.skani.ani?.toFixed(2)+'%', sid.skani.ani>=99?'green':sid.skani.ani>=95?'yellow':'red')}</td></tr>
        <tr><td>Aln. fraction (query)</td><td>${sid.skani.af_query}</td></tr>
        <tr><td>Aln. fraction (reference)</td><td>${sid.skani.af_ref}</td></tr>` : `
        <tr><td colspan="2" style="color:var(--muted)">SKANI returned no hit (sketch missing this species?)</td></tr>`}
      <tr><th colspan="2">Bracken (Kraken2, reads)</th></tr>
      <tr><td>Primary species</td><td>${sid.primary_species.replace(/_/g,' ')}
        ${badge(sid.primary_pct.toFixed(1)+'%', sid.primary_pct>=80?'green':sid.primary_pct>=60?'yellow':'red')}</td></tr>
      <tr><td>Secondary species</td><td>${sid.secondary_species.replace(/_/g,' ')}
        ${badge(sid.secondary_pct.toFixed(1)+'%', sid.secondary_pct>=10?'yellow':'blue')}</td></tr>
      <tr><td>Unclassified</td><td>${badge(sid.unclassified_pct.toFixed(1)+'%', sid.unclassified_pct>=20?'yellow':'blue')}</td></tr>
    </table>
  </div></div>`;
  h += `</div>`;

  // -- AMR genes (tabbed by type)
  const amr_type_order = ['AMR', 'VIRULENCE', 'STRESS'];
  const amr_type_label = {AMR:'Resistance genes', VIRULENCE:'Virulence genes', STRESS:'Stress response'};
  const amr_type_color = {AMR:'#b02a37', VIRULENCE:'#856404', STRESS:'#495057'};

  h += `<h2>AMRFinder hits</h2>
  <div class="alert alert-blue" style="margin-bottom:10px;font-family:inherit">
    Resistance genes are linked to plasmids via contig ID: MOB-suite classifies each contig by mobility (conjugative / mobilizable / non-mobilizable),
    and PlasmidFinder identifies replicons on the same contig. MEfinder detects insertion sequences and transposons per contig &mdash;
    an AMR gene and an MGE on the same contig suggests potential mobilization but does not confirm functional linkage.
    Conjugative plasmids carrying AMR genes pose the highest dissemination risk between isolates and across species.
  </div>`;
  if (!s.amr.details.length) {
    h += `<div class="card"><p style="color:var(--muted)">No hits.</p></div>`;
  } else {
    for (const typ of amr_type_order) {
      const rows = s.amr.details.filter(g => g.type === typ);
      if (!rows.length) continue;
      h += `<h2 style="color:${amr_type_color[typ]};font-size:0.95rem;margin-top:12px">${amr_type_label[typ]||typ}</h2>
      <div class="card" style="padding:0">
      <table><tr><th>Gene</th><th>Name</th><th>Class / Subclass</th><th>Scope</th><th>Contig</th><th>Plasmid mobility</th><th>Replicon</th><th>PlasmidFinder</th><th>MGE</th></tr>`;
      for (const g of rows) {
        const cls_str = [g.class, g.subclass].filter(x=>x&&x!=='-'&&x!=='NA').join(' / ') || '-';
        const mge_str = (g.mge&&g.mge.length)
          ? g.mge.map(m=>`<span class="badge yellow" title="${m.type}">${m.name}</span>`).join(' ')
          : '-';
        const pf_str = (g.plasmids&&g.plasmids.length)
          ? g.plasmids.map(p=>`<span class="badge red">${p}</span>`).join(' ')
          : '-';
        h += `<tr>
          <td><strong>${g.gene}</strong></td>
          <td style="font-size:0.82rem">${g.gene_name}</td>
          <td>${cls_str}</td>
          <td>${badge(g.scope||'-', g.scope==='core'?'blue':'green')}</td>
          <td style="font-family:monospace;font-size:0.82rem">${g.location}</td>
          <td>${mob_badge(g.mobility)}</td>
          <td style="font-size:0.82rem">${g.replicon}</td>
          <td style="font-size:0.82rem">${pf_str}</td>
          <td style="font-size:0.82rem">${mge_str}</td>
        </tr>`;
      }
      h += `</table></div>`;
    }
    // Catch any types not in the predefined list
    const other = s.amr.details.filter(g => !amr_type_order.includes(g.type));
    if (other.length) {
      h += `<h2 style="font-size:0.95rem;margin-top:12px">Other</h2><div class="card" style="padding:0"><table>
        <tr><th>Gene</th><th>Name</th><th>Type</th><th>Class</th><th>Contig</th><th>Mobility</th></tr>`;
      for (const g of other)
        h += `<tr><td><strong>${g.gene}</strong></td><td>${g.gene_name}</td><td>${g.type}</td><td>${g.class}</td><td style="font-family:monospace;font-size:0.82rem">${g.location}</td><td>${mob_badge(g.mobility)}</td></tr>`;
      h += `</table></div>`;
    }
  }

  // -- Plasmids
  h += `<h2>Plasmids</h2><div class="card"><div class="grid" style="margin-bottom:12px">
    <div class="stat"><div class="val">${s.plasmids.count}</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="val" style="color:${s.plasmids.conjugative?'#b02a37':'inherit'}">${s.plasmids.conjugative}</div><div class="lbl">Conjugative</div></div>
    <div class="stat"><div class="val" style="color:${s.plasmids.mobilizable?'#856404':'inherit'}">${s.plasmids.mobilizable}</div><div class="lbl">Mobilizable</div></div>
    <div class="stat"><div class="val">${s.plasmids.non_mobilizable}</div><div class="lbl">Non-mobilizable</div></div>
  </div>
  <table><tr><th>Plasmid</th><th>Replicon</th><th>Relaxase</th><th>Mobility</th><th>Host range</th><th>Cluster</th><th>Size (bp)</th></tr>`;
  for (const p of s.plasmids.details) {
    h += `<tr>
      <td>${p.file_id}</td><td>${p.replicon}</td><td>${p.relaxase}</td>
      <td>${mob_badge(p.mobility)}</td><td>${p.host_range}</td>
      <td>${p.cluster}</td><td>${Number(p.size).toLocaleString()}</td>
    </tr>`;
  }
  h += `</table></div>`;

  // -- PlasmidFinder
  if (s.plasmidfinder?.hits?.length) {
    h += `<h2>PlasmidFinder</h2><div class="card" style="padding:0">
    <table><tr><th>Replicon</th><th>Identity</th><th>Contig</th><th>Database</th><th>Accession</th></tr>`;
    for (const p of s.plasmidfinder.hits) {
      h += `<tr>
        <td><strong>${p.plasmid}</strong></td>
        <td>${p.identity}%</td>
        <td style="font-family:monospace;font-size:0.82rem">${p.contig}</td>
        <td style="font-size:0.82rem">${p.database}</td>
        <td style="font-size:0.82rem">${p.accession}</td>
      </tr>`;
    }
    h += `</table></div>`;
  }

  // -- SCCmec (S. aureus only)
  if (s.sccmec?.type && s.sccmec.type!=='-' && s.sccmec.type!=='skipped') {
    const SCCMEC = {"I":"HA-MRSA, early","II":"HA-MRSA ST5/CC5","III":"HA-MRSA, largest cassette",
                    "IV":"CA/HA-MRSA, most common (USA300)","V":"CA-MRSA, small cassette",
                    "VI":"HA-MRSA ST239","XI":"mecC -- bovine origin"};
    h += `<h2>SCCmec typing</h2><div class="card">
      <div class="alert ${s.sccmec.mrsa?'alert-red':'alert-green'}" style="margin-bottom:10px">
        <strong>${s.sccmec.mrsa?'MRSA':'MSSA'} -- SCCmec type ${s.sccmec.type}</strong>
      </div>
      <table>
        <tr><td>Type</td><td>${s.sccmec.type}</td></tr>
        <tr><td>Clinical context</td><td>${SCCMEC[s.sccmec.type]||'See IWG-SCC'}</td></tr>
        ${s.spatyper?.spa_type && s.spatyper.spa_type!=='-'
          ? `<tr><td>spa-type</td><td>${s.spatyper.spa_type} (${s.spatyper.CC})</td></tr>` : ''}
        <tr><td>MRSA nomenclature</td><td>ST${s.mlst.ST}-SCCmec${s.sccmec.type} (${s.spatyper?.spa_type||'-'})</td></tr>
      </table>
    </div>`;
  }

  // -- LRE-Finder (Enterococcus linezolid resistance, read-based)
  if (s.lrefinder) {
    const lre = s.lrefinder;
    const hasResistance = lre.n_acquired > 0 || (lre.max_23s_mut_pct != null && lre.max_23s_mut_pct >= 1);
    h += `<h2>Linezolid resistance (LRE-Finder)</h2><div class="card">
      <div class="alert ${hasResistance ? 'alert-red' : 'alert-green'}" style="margin-bottom:10px">
        <strong>${hasResistance ? 'Linezolid resistance markers DETECTED' : 'No linezolid resistance markers detected'}</strong>
        &nbsp;<span style="font-weight:normal;font-size:0.85rem">(KMA on trimmed reads; reports % of mutated 23S rRNA copies + acquired resistance genes)</span>
      </div>
      ${lre.acquired_genes.length ? `
        <h3 style="margin-top:8px;font-size:0.95rem;color:#b02a37">Acquired resistance genes (${lre.acquired_genes.length})</h3>
        <table>
          <thead><tr><th>Gene template</th><th>Identity</th><th>Coverage</th><th>Depth</th></tr></thead>
          <tbody>
            ${lre.acquired_genes.map(g => `<tr>
              <td><strong>${g.template}</strong></td>
              <td>${g.identity.toFixed(2)}%</td>
              <td>${g.coverage.toFixed(2)}%</td>
              <td>${g.depth}×</td>
            </tr>`).join('')}
          </tbody>
        </table>` : ''}
      ${lre.ribosomal_hits.length ? `
        <h3 style="margin-top:10px;font-size:0.95rem">23S rRNA references</h3>
        <p style="font-size:0.8rem;color:var(--muted);margin:2px 0 6px 0">
          E. faecium / faecalis carry 6 copies of 23S rRNA. <strong>Mutated %</strong> below = fraction of copies carrying the linezolid-resistance mutation (G2576T, G2505A, etc.). &ge;1% suggests partial mosaicism worth phenotypic confirmation; &ge;5% is typically associated with clinical resistance.
        </p>
        <table>
          <thead><tr><th>Reference</th><th>Identity</th><th>Mutated %</th><th>Coverage</th><th>Depth</th></tr></thead>
          <tbody>
            ${lre.ribosomal_hits.map(r => {
              const mp = r.mut_pct;
              const c  = mp == null ? 'inherit' : mp >= 5 ? '#b02a37' : mp >= 1 ? '#856404' : 'inherit';
              return `<tr>
                <td style="font-family:monospace;font-size:0.82rem">${r.template}</td>
                <td>${r.identity.toFixed(2)}%</td>
                <td style="color:${c};font-weight:600">${mp != null ? mp.toFixed(2) + '%' : '-'}</td>
                <td>${r.coverage.toFixed(2)}%</td>
                <td>${r.depth}×</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>` : ''}
      <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
        Caveats: assemblies collapse the 6 rRNA copies into one consensus, so assembly-based AMR tools may miss low-mosaicism resistance. LRE-Finder maps reads directly to track the per-copy state. Verify clinical resistance with MIC.
      </p>
      <p style="font-size:0.72rem;color:var(--muted);margin-top:6px;font-style:italic">
        Filtering applied:
        acquired-gene rows below <strong>90% template coverage</strong> or <strong>98% identity</strong> are dropped (k-mer noise / fragmentary hits);
        23S rows below <strong>50% coverage</strong> or <strong>80% identity</strong> are dropped (cross-species probe).
        Banner turns red when an acquired gene survives or 23S mosaicism &ge; 1%.
        Raw output retained at <code>results/&lt;sample&gt;/LRE-Finder/lre.res</code> for borderline review.
      </p>
    </div>`;
  }

  // -- MGE
  if (s.mge && s.mge.count > 0) {
    h += `<h2>Mobile genetic elements (MGE)</h2><div class="card">
    <table><tr><th>#</th><th>Name</th><th>Type</th><th>Contig</th><th>Start</th><th>End</th></tr>`;
    for (const m of s.mge.elements) {
      h += `<tr><td>${m.nr}</td><td><strong>${m.name}</strong></td><td>${m.type}</td>
        <td>${m.contig}</td><td>${m.start}</td><td>${m.end}</td></tr>`;
    }
    h += `</table></div>`;
  }

  // -- Typing methods used
  h += `<h2>Typing methods</h2><div class="card">
  <table><tr><th>Tool</th><th>Result</th><th>Database / method</th></tr>
    <tr><td>Kraken2 + Bracken</td>
      <td>${sid.primary_species.replace(/_/g,' ')} ${badge(sid.primary_pct.toFixed(1)+'%', sid.primary_pct>=80?'green':'yellow')}</td>
      <td style="font-size:0.8rem">${sid.kraken2_db}</td></tr>
    ${sid.skani?.status==='ok'
      ? `<tr><td>skani</td>
          <td>${sid.skani.top_hit} &mdash; ${badge(sid.skani.ani?.toFixed(2)+'% ANI', sid.skani.ani>=99?'green':sid.skani.ani>=95?'yellow':'red')}</td>
          <td style="font-size:0.8rem">skani reference database</td></tr>`
      : `<tr><td>skani</td><td style="color:var(--muted)">No hit (sketch missing this species?)</td><td>-</td></tr>`}
    <tr><td>MLST (PubMLST)</td><td>ST${s.mlst.ST}</td><td>${s.mlst.scheme}</td></tr>
    <tr><td>AMRFinder v4</td>
      <td>${s.amr.total_amr_genes} AMR &nbsp; ${s.amr.total_virulence_genes} virulence &nbsp; ${s.amr.total_stress_genes||0} stress</td>
      <td>NCBI AMR Reference Gene Catalog</td></tr>
    <tr><td>MOB-suite (mob_typer)</td><td>${s.plasmids.count} plasmid(s)</td><td>mob_suite database</td></tr>
    ${s.mge && s.mge.count > 0
      ? `<tr><td>MobileElementFinder</td><td>${s.mge.count} MGE(s)</td><td>MGEdb v1.1.1 (CGE)</td></tr>` : ''}
    ${s.species?.includes('Klebsiella') || s.species?.includes('Escherichia') || s.species?.includes('Shigella')
      ? `<tr><td>Kleborate</td>
          <td>${s.kleborate?.ST&&s.kleborate.ST!=='-'?'ST'+s.kleborate.ST+' &nbsp; ':''
            }K: ${s.kleborate?.K_type||'-'} &nbsp; O: ${s.kleborate?.O_type||'-'}
              &nbsp; Virulence: ${s.kleborate?.virulence_score||'-'}</td>
          <td>Kleborate v3 (${
            s.species.includes('Klebsiella_pneumoniae')||s.species.includes('Klebsiella_variicola')||s.species.includes('Klebsiella_quasipneumoniae') ? 'kpsc' :
            s.species.includes('Klebsiella_oxytoca')||s.species.includes('Klebsiella_michiganensis') ? 'kosc' : 'escherichia'} preset)</td></tr>` : ''}
    ${s.species?.includes('Staphylococcus_aureus')
      ? `<tr><td>StaphScope</td>
           <td>spa: ${s.spatyper?.spa_type||'-'} &nbsp; SCCmec: ${s.sccmec?.type||'-'} &nbsp; ${s.sccmec?.mrsa?badge('MRSA','red'):badge('MSSA','green')}</td>
           <td>StaphScope (spa, SCCmec, MRSA status, virulence, lineage)</td></tr>` : ''}
    ${s.species?.includes('Escherichia') || s.species?.includes('Shigella')
      ? `<tr><td>ECTyper</td><td>${s.ectyper?.serotype||'-'}</td><td>ECTyper v2</td></tr>` : ''}
    ${s.species?.includes('Streptococcus_pyogenes')
      ? `<tr><td>emmtyper</td><td>${s.emmtyper?.emm_type||'-'}</td><td>CDC emm type database</td></tr>` : ''}
    ${s.species?.includes('Salmonella') && s.seqsero2
      ? `<tr><td>SeqSero2</td><td>${s.seqsero2.serotype} (${s.seqsero2.antigenic_profile})</td><td>Kauffmann-White scheme</td></tr>` : ''}
    ${s.species?.includes('Haemophilus') && s.hicap
      ? `<tr><td>hicap</td><td>${s.hicap.serotype} &mdash; genes: ${s.hicap.genes}</td><td>hicap database</td></tr>` : ''}
  </table></div>`;

  h += `<p style="color:var(--muted);font-size:0.78rem;margin-top:16px">
    Generated: ${s.completed} | Bacterial genomics pipeline
  </p>`;

  document.getElementById('root').innerHTML = h;
}
render();
</script>
</body>
</html>
