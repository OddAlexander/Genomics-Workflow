<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phylogenomics Report</title>
<style>
  :root {
    --blue:   #1a3a5c;
    --blue2:  #2e6da4;
    --green:  #28a745;
    --yellow: #ffc107;
    --red:    #dc3545;
    --bg:     #f5f7fa;
    --card:   #ffffff;
    --border: #e2e8f0;
    --text:   #1a1a2e;
    --muted:  #6c757d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; font-size: 14px; }
  h1 { color: var(--blue); font-size: 1.5rem; padding-bottom: 10px;
       border-bottom: 2px solid var(--blue); margin-bottom: 20px; }
  h2 { color: var(--blue2); font-size: 1.1rem; margin: 20px 0 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 16px; margin-bottom: 12px; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .meta span { margin-right: 24px; }
  .meta strong { color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: var(--blue); color: white; padding: 7px 12px; text-align: left; font-weight: 600; }
  td { padding: 5px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #f8fafc; }
  .snp-wrap { overflow: auto; }
  .snp-matrix { width: auto; white-space: nowrap; }
  .snp-matrix th, .snp-matrix td { padding: 4px 8px; text-align: center; font-size: 0.82rem;
                                    border: 1px solid var(--border); }
  .snp-matrix th { background: var(--blue); color: white; }
  .snp-matrix td { font-variant-numeric: tabular-nums; }
  .dl-btn { display: inline-block; padding: 7px 18px; border-radius: 5px;
            background: var(--blue2); color: white; text-decoration: none;
            font-size: 0.88rem; font-weight: 600; margin-right: 10px; }
  .dl-btn:hover { background: var(--blue); }
  .tree-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tree-label { font-weight: 600; min-width: 80px; color: var(--text); }
  .tree-note { font-size: 0.82rem; color: var(--muted); }
</style>
</head>
<body>
<h1>Phylogenomics Report</h1>
<div id="root"></div>

<script>
const D = __PHYLO_JSON_DATA__;

// ── SNP matrix renderer ────────────────────────────────────────────────────
// Colour ramp: 0 = blank, ≤threshold = green→darker green, >threshold = pink→red.
// Without a threshold, ramps from pale to red across the matrix's max value.
function luma(r, g, b) { return 0.299*r + 0.587*g + 0.114*b; }

function renderSNPMatrix(data, threshold) {
  const { samples, matrix } = data;
  if (!samples.length) return '<p style="color:var(--muted)">No SNP distance matrix available.</p>';

  const vals = matrix.flat().filter(v => v > 0);
  const maxV = vals.length ? Math.max(...vals) : 1;

  function rampRGB(v) {
    if (threshold != null) {
      if (v <= threshold) {
        const t = v / threshold;
        return [255 - t*215, 255 - t*88, 255 - t*186];
      }
      const t = Math.min((v - threshold) / (maxV - threshold || 1), 1);
      return [255 - t*75, 200 - t*170, 200 - t*170];
    }
    const t = v / maxV;
    return [255 - t*35, 255 - t*185, 255 - t*185];
  }
  function cellBg(v) {
    if (v === 0) return '#f8fafc';
    const [r, g, b] = rampRGB(v);
    return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
  }
  function cellFg(v) {
    if (v === 0) return '#1a1a2e';
    const [r, g, b] = rampRGB(v);
    return luma(r, g, b) < 140 ? '#fff' : '#1a1a2e';
  }

  let html = '';
  if (threshold != null) {
    html += `<p style="font-size:0.82rem;margin-bottom:8px">
      <span style="display:inline-block;width:12px;height:12px;background:#28a745;border-radius:2px;vertical-align:middle;margin-right:5px"></span>≤${threshold} SNPs (same cluster)
      &ensp;<span style="display:inline-block;width:12px;height:12px;background:#dc3545;border-radius:2px;vertical-align:middle;margin-right:5px"></span>&gt;${threshold} SNPs (different cluster)
    </p>`;
  }
  html += '<table class="snp-matrix"><thead><tr><th></th>';
  for (const n of samples) html += `<th>${n}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i < matrix.length; i++) {
    html += `<tr><th style="text-align:left">${samples[i]}</th>`;
    for (let j = 0; j < matrix[i].length; j++) {
      const v = matrix[i][j];
      html += `<td style="background:${cellBg(v)};color:${cellFg(v)}">${v}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

// ── Page render ────────────────────────────────────────────────────────────
function fmt(n) { return n ? n.toLocaleString('en-GB') : '-'; }

function qcCell(val, text, warnBelow, badBelow) {
  if (val == null) return '<td>-</td>';
  const s = val < badBelow  ? 'color:var(--red);font-weight:600'
          : val < warnBelow ? 'color:var(--yellow);font-weight:600'
          : '';
  return `<td style="${s}">${text}</td>`;
}

const refLabel = D.reference || '-';

document.getElementById('root').innerHTML = `
<div class="meta">
  <span><strong>Date:</strong> ${D.run_date}</span>
  <span><strong>Reference:</strong> ${refLabel}</span>
  <span><strong>Samples:</strong> ${D.n_samples}</span>
</div>

<div class="card">
  <h2>Reference</h2>
  <table>
    <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
    <tbody>
      <tr><td>Name</td><td><strong>${D.reference}</strong></td></tr>
      <tr><td>Source</td><td>${D.ref_auto ? 'Auto-generated (Bakta on first sample)' : 'External'}</td></tr>
      <tr><td>Path</td><td style="font-family:monospace;font-size:0.82rem">${D.ref_path}</td></tr>
    </tbody>
  </table>
  <h3 style="margin-top:16px;font-size:0.95rem">Interpreting reference distance</h3>
  <table style="font-size:0.85rem">
    <thead><tr>
      <th style="text-align:left">Reference vs samples</th>
      <th>SNPs (whole genome)</th>
      <th>ANI</th>
      <th style="text-align:left">Verdict</th>
    </tr></thead>
    <tbody>
      <tr><td>Same isolate / direct ancestor</td><td>0&ndash;50</td><td>~100%</td><td style="color:var(--green,#1a7f37)">ideal but unrealistic</td></tr>
      <tr><td><strong>Same lineage (MLST / CC)</strong></td><td><strong>50&ndash;500</strong></td><td><strong>&ge;99.9%</strong></td><td style="color:var(--green,#1a7f37)"><strong>optimal &mdash; recommended for outbreak SNP analysis</strong></td></tr>
      <tr><td>Same MLST, different sub-lineage</td><td>500&ndash;2 000</td><td>~99.5%</td><td>usable for outbreaks</td></tr>
      <tr><td>Same species, different MLST</td><td>2 000&ndash;15 000</td><td>~99%</td><td style="color:var(--yellow)">SNP counts noisy</td></tr>
      <tr><td>Same species, distant lineage</td><td>15 000&ndash;30 000</td><td>~98%</td><td style="color:var(--yellow)">marginal-call inflation</td></tr>
      <tr><td>Different species</td><td>&gt;30 000</td><td>&lt;97%</td><td style="color:var(--red)">don't &mdash; use Parsnp</td></tr>
    </tbody>
  </table>
  <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
    Compare to the <strong>Reference</strong> column in the SNP distance matrices below to assess where this run sits.
    Excessive distance inflates Snippy SNP counts via lowercase / marginal calls (see snp-dists default behaviour).
  </p>
  <p style="font-size:0.75rem;color:var(--muted);margin-top:8px;line-height:1.5">
    <strong>Sources.</strong>
    ANI 95% species boundary: Jain et al. 2018, <em>Nat Commun</em> 9:5114
    (<a href="https://doi.org/10.1038/s41467-018-07641-9">doi:10.1038/s41467-018-07641-9</a>).
    Outbreak SNP cutoffs vary by species &mdash; review: Schürch et al. 2018, <em>Clin Microbiol Infect</em> 24:350&ndash;354
    (<a href="https://doi.org/10.1016/j.cmi.2017.12.016">doi:10.1016/j.cmi.2017.12.016</a>).
    Reference-selection guidance for Snippy: Seemann T,
    <a href="https://github.com/tseemann/snippy">github.com/tseemann/snippy</a>.
    Exact SNP ranges here are operational synthesis &mdash; species-specific thresholds (e.g. <em>S. aureus</em>: Coll et al. 2017, <em>Lancet Infect Dis</em>;
    <em>Salmonella</em>: PulseNet protocols) should be used when available.
  </p>
</div>

<div class="card">
  <h2>Snippy settings</h2>
  <table>
    <thead><tr><th>Parameter</th><th>Value</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td><code>--mincov</code></td><td><strong>${D.snippy_mincov}</strong></td><td>Minimum read coverage for calling a variant</td></tr>
      <tr><td><code>--minfrac</code></td><td><strong>${D.snippy_minfrac}</strong></td><td>Minimum allele frequency for calling a variant</td></tr>
      ${D.core_snp_count != null ? `<tr><td>Core SNPs (core.tab)</td><td><strong>${D.core_snp_count.toLocaleString('en-GB')}</strong></td><td>Variant positions in core alignment (all samples)</td></tr>` : ''}
      ${D.gubbins_snp_count != null ? `<tr><td>SNPs after Gubbins</td><td><strong>${D.gubbins_snp_count.toLocaleString('en-GB')}</strong></td><td>Polymorphic positions after masking recombination</td></tr>` : ''}
    </tbody>
  </table>
  ${D.core_coverage && D.core_coverage.length ? `
  <h3 style="margin-top:1.2rem;font-size:0.95rem">Per-sample core statistics (snippy-core)</h3>
  <table>
    <thead><tr>
      <th>Sample ID</th><th>Ref. length</th><th>Aligned</th><th>Unaligned</th><th>Variants</th><th>Het</th><th>Low coverage</th>
    </tr></thead>
    <tbody>
      ${D.core_coverage.map(r => `<tr>
        <td style="font-family:monospace">${r.id}</td>
        <td>${fmt(r.length)}</td>
        <td>${fmt(r.aligned)}</td>
        <td>${fmt(r.unaligned)}</td>
        <td><strong>${fmt(r.variant)}</strong></td>
        <td>${fmt(r.het)}</td>
        <td>${fmt(r.lowcov)}</td>
      </tr>`).join('')}
    </tbody>
  </table>` : ''}
</div>

<div class="card">
  <h2>Sample QC summary</h2>
  <div class="snp-wrap">
  <table class="snp-matrix" style="width:100%">
    <thead><tr>
      <th style="text-align:left">Sample ID</th>
      <th>Reads (raw)</th><th>Reads (trimmed)</th><th>Q30%</th><th>Dup%</th>
      <th>Depth</th><th>Breadth%</th>
      <th title="Bracken top-species fraction — purity check">Top sp.%</th>
      <th>Contigs</th><th>N50</th><th>Largest contig</th><th>GC%</th>
      <th title="CheckM lineage_wf: % single-copy markers detected">Compl.%</th>
      <th title="CheckM lineage_wf: % duplicate markers (contamination proxy)">Contam.%</th>
      <th>ANI%</th><th style="text-align:left">Species</th>
    </tr></thead>
    <tbody>
      ${D.samples.map(s => `<tr>
        <td style="font-family:monospace;text-align:left;white-space:nowrap">${s.id}</td>
        <td>${s.reads_raw != null ? fmt(s.reads_raw) : '-'}</td>
        <td>${s.reads_trimmed != null ? fmt(s.reads_trimmed) : '-'}</td>
        ${qcCell(s.q30_pct,  s.q30_pct  != null ? s.q30_pct  + '%' : '-', 90, 80)}
        <td>${s.dup_pct != null ? s.dup_pct + '%' : '-'}</td>
        ${qcCell(s.depth,    s.depth    != null ? s.depth    + '×' : '-', 40, 20)}
        ${qcCell(s.breadth,  s.breadth  != null ? s.breadth  + '%' : '-', 90, 80)}
        ${qcCell(s.kraken_primary_pct, s.kraken_primary_pct != null ? s.kraken_primary_pct + '%' : '-', 90, 80)}
        <td>${s.contigs}</td>
        <td>${fmt(s.N50)}</td>
        <td>${fmt(s.largest_contig)}</td>
        <td>${s.gc_pct != null ? s.gc_pct + '%' : '-'}</td>
        ${qcCell(s.completeness, s.completeness != null ? s.completeness.toFixed(1) + '%' : '-', 95, 90)}
        ${(() => {
          if (s.contamination == null) return '<td>-</td>';
          const c = s.contamination >= 5 ? 'color:var(--red);font-weight:600'
                  : s.contamination >= 2 ? 'color:var(--yellow);font-weight:600' : '';
          return `<td style="${c}">${s.contamination.toFixed(1)}%</td>`;
        })()}
        <td>${s.ani != null ? s.ani + '%' : '-'}</td>
        <td style="text-align:left"><em>${s.species}</em></td>
      </tr>`).join('')}
    </tbody>
  </table>
  </div>
  <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
    <span style="color:var(--yellow);font-weight:600">■</span> warn &ensp;
    <span style="color:var(--red);font-weight:600">■</span> flag &ensp;
    Thresholds: Q30 &lt;80%/90%, depth &lt;20×/40×, breadth &lt;80%/90%, top sp.% &lt;80%/90%, compl. &lt;90%/95%, contam. &ge;2%/5%
    <br>Depth/breadth from <code>samtools coverage</code> on the Snippy reference-mapped BAM (length-weighted mean).
  </p>
</div>

<div class="card" style="background:#e8f4f8;border-left:4px solid var(--blue2)">
  <h2 style="margin-top:0;color:var(--blue);font-size:0.95rem">Coverage requirements for SNP-grade typing</h2>
  <ul style="font-size:0.85rem;margin:6px 0 0 18px;line-height:1.6">
    <li><strong>&ge;40&times;</strong> mean coverage to support Snippy's <code>--mincov</code> reliably across the genome &mdash; matches Ridom / SeqSphere standards</li>
    <li><strong>&ge;50&times;</strong> preferred for outbreak reporting (PulseNet, cgMLST.org submissions)</li>
    <li>Below 40&times; mean, Snippy starts dropping positions from the core alignment &mdash; inflates apparent inter-isolate distance</li>
    <li>Per-contig minimum should be &ge;20&times; (uneven coverage drops accuracy more than low mean alone)</li>
  </ul>
  <p style="font-size:0.78rem;color:var(--muted);margin-top:8px">
    Sources: Ridom SeqSphere+ NGS QC guide; PulseNet outbreak workflows. Same coverage floor applies to cgMLST.
  </p>
</div>

<div class="card">
  <h2>SNP distance matrix (raw core genome)</h2>
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists, D.snp_threshold)}
  </div>
</div>

<div class="card">
  <h2>SNP distance matrix (Gubbins-filtered)</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Recombinant regions have been masked. These SNP distances are more representative of vertical evolution.</p>
  ${D.gubbins_recomb != null ? `
  <div style="font-size:0.85rem;margin-bottom:12px;padding:8px 12px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)">
    <strong>Gubbins recombination:</strong>
    ${D.gubbins_recomb.regions} regions masked,
    total <strong>${fmt(D.gubbins_recomb.bases_masked)}</strong> bp
    ${D.core_snp_count && D.gubbins_snp_count != null
      ? ` — SNP positions reduced from <strong>${D.core_snp_count.toLocaleString('en-GB')}</strong> to <strong>${D.gubbins_snp_count.toLocaleString('en-GB')}</strong>`
      : ''}
  </div>` : ''}
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists_gubbins, D.snp_threshold)}
  </div>
</div>

<div class="card">
  <h2>Parsnp SNP distance matrix (assembly-based)</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Independent of read mapping — Parsnp aligns assemblies directly. Provides complementary evidence to the Snippy/Gubbins analysis above.</p>
  ${D.parsnp_snp_count != null ? `
  <div style="font-size:0.85rem;margin-bottom:12px;padding:8px 12px;background:#f8fafc;border-radius:6px;border:1px solid var(--border)">
    <strong>Parsnp variant positions:</strong> <strong>${D.parsnp_snp_count.toLocaleString('en-GB')}</strong>
    ${D.core_snp_count != null ? ` &ensp;·&ensp; Snippy core SNPs: ${D.core_snp_count.toLocaleString('en-GB')}` : ''}
    ${D.gubbins_snp_count != null ? ` &ensp;·&ensp; After Gubbins: ${D.gubbins_snp_count.toLocaleString('en-GB')}` : ''}
  </div>` : ''}
  <div class="snp-wrap">
    ${renderSNPMatrix(D.snp_dists_parsnp, D.snp_threshold)}
  </div>
  ${D.parsnp_tree ? `<div class="tree-row" style="margin-top:12px">
    <span class="tree-label">Parsnp</span>
    <a class="dl-btn" download="parsnp.tree"
       href="data:text/plain;charset=utf-8,${encodeURIComponent(D.parsnp_tree)}">Download tree</a>
    <span class="tree-note">Whole-genome alignment, auto-selected reference</span>
  </div>` : ''}
</div>

<div class="card" style="padding:0">
  <h2 style="padding:16px 20px 8px">Tools and versions</h2>
  <table><thead><tr><th>Tool</th><th>Version</th><th>Tool</th><th>Version</th></tr></thead>
  <tbody>${(() => { const vs = D.versions || []; let r = ''; for (let i = 0; i < vs.length; i += 2) { const a = vs[i], b = vs[i+1] || {}; r += `<tr><td>${a.tool}</td><td style="font-family:monospace">${a.version}</td><td>${b.tool||''}</td><td style="font-family:monospace">${b.version||''}</td></tr>`; } return r; })()}</tbody>
  </table>
</div>

<div class="card">
  <h2>Tree files</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:12px">Upload to <a href="https://itol.embl.de/upload.cgi" target="_blank">iTOL</a>, <a href="https://microreact.org/upload" target="_blank">Microreact</a>, or open in FigTree.</p>
  ${D.iqtree ? `<div class="tree-row">
    <span class="tree-label">IQ-TREE</span>
    <a class="dl-btn" download="iqtree.treefile"
       href="data:text/plain;charset=utf-8,${encodeURIComponent(D.iqtree)}">Download</a>
    <span class="tree-note">GTR+G, UFBoot 1000</span>
  </div>` : ''}
  ${D.parsnp_tree ? `<div class="tree-row">
    <span class="tree-label">Parsnp</span>
    <a class="dl-btn" download="parsnp.tree"
       href="data:text/plain;charset=utf-8,${encodeURIComponent(D.parsnp_tree)}">Download</a>
    <span class="tree-note">Whole-genome alignment</span>
  </div>` : ''}
</div>
`;

</script>
</body>
</html>
