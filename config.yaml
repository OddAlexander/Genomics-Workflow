# =============================================================================
# config.yaml — Bacterial Genomics Pipeline configuration
# =============================================================================

# Sample list — comment out to auto-detect from data_dir
# samples:
#   - 001k
#   - 002k
#   - 003k

# Directory containing raw FASTQ files
# Expected structure: data/<sample>/<sample>_R1.fastq.gz
data_dir: /srv/data

# Output directory (main pipeline)
results_dir: /srv/results

# Shared output root for the phylogenomics and cgMLST pipelines.
# Each pipeline appends its own subdir + run_name, so the same run_name is safe
# for both:
#   phylo  -> <results_base>/phylo/<run_name>/
#   cgmlst -> <results_base>/cgmlst/<run_name>/
# run_name defaults to DD-MM-YYYY_HHMM (override with --config run_name=outbreak_x).
#
# If left unset, the Snakefile defaults to /srv/phylo_results/$USER -- the $USER
# expansion happens in Python (os.environ["USER"]), not in YAML. To override,
# uncomment and use a literal path (YAML does NOT expand env vars):
# results_base: /home/odd/genomics/phylo_results/odd
#   results_base: /scratch/projects/outbreak_2026

# Directory containing pipeline scripts (from install-scripts.sh)
scripts_dir: ~/bin


# Number of threads per rule (override per rule in Snakefile if needed)
threads: 8

# Kraken2 / Bracken database
kraken2_db:     /databases/kraken2_db_pluspf_111GB
kraken2_mem_mb: 18000

# Path to mash sketch database (e.g. RefSeq .msh file)
mash_db: /databases/mash_db/refseq.msh

# Path to FastANI reference genome list (.txt, one genome path per line)
# Run scripts/download_fastani_refs.sh to populate this database
fastani_db: /databases/fastani_db/reference_list.txt

# Variant-calling pipeline (Snakefile_varcall) -- override via --config if needed.
# refseq_list:           refseq_list.json                     # species -> {fasta, gff} map (default: next to the Snakefile)
# refseq_min_identity:   0.95                                  # Mash containment floor
# bcftools_min_qual:     20                                    # PASS threshold for QUAL
# bcftools_min_dp:       10                                    # PASS threshold for INFO/DP
# bcftools_min_mq:       40                                    # mpileup mapping-quality floor

